<!DOCTYPE html> <!-- HTML5 document declare karta hai -->
<html lang="en"> <!-- Language English set -->

<head>
<meta charset="UTF-8"> <!-- Character encoding UTF-8 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive design ke liye -->

<title>TrackIn-Take Bot</title> <!-- Page title -->

<!-- External CSS file link -->
<link rel="stylesheet" href="assets/styles.css">
</head>

<body>

<!-- ================= CHAT ICON ================= -->
<!-- Floating chatbot icon (bottom-right) -->
<div class="chatbot-logo" id="chatIcon">
  <img src="assets/icon.png" alt="chatbot"> <!-- Chatbot image -->
</div>

<!-- ================= CHATBOX ================= -->
<!-- Main chatbot container -->
<div id="chatBox" class="chatbot-container">

  <!-- HEADER SECTION -->
  <div class="header">

    <!-- Back button -->
    <span onclick="goBack()">←</span>

    <!-- Chatbot title -->
    <span>TrackIn-Take Bot</span>

    <!-- Menu button -->
    <span onclick="toggleMenu()">☰</span>

  </div>

  <!-- Menu panel (hidden initially) -->
  <div id="menuPanel" class="menu-panel"></div>

  <!-- Dynamic content area -->
  <div id="content"></div>

</div>

<script>

// PAGE LOAD 

// Jab page load hota hai tab ye function run hota hai
window.onload = function(){

  // Chat icon select karo
  const icon = document.getElementById("chatIcon");

  // Click event add karo
  icon.onclick = function(){
    openBot(); // Bot open karega
  };

};

//CLOSE BOT 

// Chatbot close karne ka function
function closeBot(){
  document.getElementById("chatBox").style.display = "none"; // Hide chatbot
}

//GLOBAL VARIABLES

let historyStack = []; // Previous pages store karne ke liye (back button)
let activeData = null; // Current selected data (user ya nutrition)
let cache = {}; // API response cache (fast response ke liye)

//MENU DATA 

// Menu ke options aur unke content
const menuData = {
  "About TrackIntake": "TrackIntake is an AI-powered nutrition platform.",
  "Data & Security": "Your data is safe and secure.",
  "Contact Us": "📞 7898622813"
};

//USER FAQ 

// User related questions
const userFAQs = {
  "How to Use": [
    { q: "How do I start using TrackIntake?" },
    { q: "What details are required first?" }
  ]
};

//NUTRITIONIST FAQ 

// Nutritionist related questions
const nutritionistFAQs = {
  "Patients": [
    { q: "Can I manage multiple patients?" },
    { q: "Can I monitor patients daily?" }
  ]
};

//OPEN BOT

// Chatbot open karne ka function
function openBot(){
  document.getElementById("chatBox").style.display = "flex"; // Show chatbot
  showHome(); // Home screen load karo
}

//HOME SCREEN

// Initial screen show karta hai
function showHome(){

  historyStack = []; // History reset

  // HTML inject karna
  document.getElementById("content").innerHTML = `
    <div style="text-align:center;padding:20px;">
      <h3>Welcome To TrackIn-Take 👋</h3>
      <h5>Please Choose a category</h5>

      <!-- Buttons -->
      <div class="btn-group">
        <button class="btn user" onclick="openSection('user')">User</button>
        <button class="btn nutrition" onclick="openSection('nutrition')">Nutritionist</button>
      </div>
    </div>
  `;
}

// BACK BUTTON

// Back navigation
function goBack(){

  // Menu close karna
  menuOpen = false;
  activeMenu = null;
  document.getElementById("menuPanel").style.display = "none";

  // Previous page load karna
  if(historyStack.length > 0){
    document.getElementById("content").innerHTML = historyStack.pop();
  }
}

//SHOW QUESTIONS 

// Category ke questions show karna
function showQ(cat){

  // Current page save
  historyStack.push(document.getElementById("content").innerHTML);

  let faqs = activeData[cat]; // Selected category data
  let html = ""; // HTML string

  // Loop through questions
  faqs.forEach((item,i)=>{
    html += `
      <div class="question" onclick="getAnswer(this, ${i})">${item.q}</div>
      <div class="answer" id="ans${i}"></div>
    `;
  });

  // Inject HTML
  document.getElementById("content").innerHTML = html;
}

// GET ANSWER 

// API se answer lena
async function getAnswer(el, i){

  let question = el.innerText; // Question text
  let ansEl = document.getElementById("ans"+i); // Answer element

  // Toggle hide/show
  if(ansEl.style.display === "block"){
    ansEl.style.display = "none";
    return;
  }

  // Loading show karna
  ansEl.innerText = "⏳ Loading...";
  ansEl.style.display = "block";

  // Cache check
  if(cache[question]){
    ansEl.innerText = cache[question];
    return;
  }

  try {

    // Timeout setup
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);

    // API request
    let res = await fetch("https://chatbot-3-3cn3.onrender.com/api/chat/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question: question }),
      signal: controller.signal
    });

    clearTimeout(timeout); // Timeout clear

    let data = await res.json(); // JSON response

    cache[question] = data.answer; // Cache save

    // Hide all answers
    document.querySelectorAll(".answer").forEach(a=>{
      a.style.display="none";
    });

    // Show current answer
    ansEl.innerText = data.answer;
    ansEl.style.display = "block";

  } catch(err){

    // Error handling
    ansEl.innerText = "⚠️ Server error";
    ansEl.style.display = "block";
  }
}

//OPEN SECTION 

// User ya Nutritionist select karna
function openSection(type){

  historyStack.push(document.getElementById("content").innerHTML);

  // Data assign
  activeData = (type==="user") ? userFAQs : nutritionistFAQs;

  // Title set
  let title = (type === "user") ? "👤 User Page" : "🥗 Nutritionist Page";

  let html = `
    <div style="text-align:center; padding:10px;">
      <h3 style="color:#f97316;">${title}</h3>
    </div>

    <div class="section-container">
  `;

  // Categories loop
  for(let cat in activeData){
    html += `<button class="section-btn" onclick="showQ('${cat}')">${cat}</button>`;
  }

  html += `</div>`;

  document.getElementById("content").innerHTML = html;
}

///MENU

let menuOpen = false; // Menu state
let activeMenu = null; // Active item

// Menu open/close
function toggleMenu(){
  menuOpen = !menuOpen;
  renderMenu();
}

// Menu render karna
function renderMenu(){

  let panel = document.getElementById("menuPanel");

  if(!menuOpen){
    panel.style.display="none";
    return;
  }

  panel.style.display="block";
  panel.innerHTML="";

  // Menu items loop
  Object.keys(menuData).forEach(item=>{
    panel.innerHTML += `
      <div>
        <div class="menu-title" onclick="toggleMenuItem('${item}')">
          ${item} <span>${activeMenu===item?"▼":">"}</span>
        </div>
        <div class="menu-content" style="display:${activeMenu===item?'block':'none'}">
          ${menuData[item]}
        </div>
      </div>`;
  });
}

// Menu item toggle
function toggleMenuItem(item){
  if(activeMenu === item){
    activeMenu = null;
  } else {
    activeMenu = item;
  }
  renderMenu();
}

</script>

</body>
</html>
