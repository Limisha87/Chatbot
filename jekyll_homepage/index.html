<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackIn-Take Bot</title>

<style>
body { margin:0; font-family:Arial; }

/* CHAT ICON */
.chatbot-logo {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.chatbot-logo:hover {
  transform: scale(1.1);
}

.chatbot-logo img {
  width: 75px;
  height: 75px;
}

/* CHATBOX */
.chatbot-container {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 320px;
  height: 450px;
  background: white;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  overflow:hidden;
   box-shadow: 0 10px 30px rgba(0,0,0,0.3);
   transition: all 0.3s ease; 
}

/* HEADER */
.header {
 background: #f97316;
 color: white;
 padding: 10px;
 display:flex;
 justify-content:space-between;
}

/* BUTTON */
.btn-group { display:flex; justify-content:center; gap:15px; }
.btn {
  border:none;
  padding:8px 17px;
  border-radius:20px;
  color:white;
  cursor:pointer;
  gap: 10px;
  
}
.user { background:rgb(236, 132, 68); }
.nutrition { background:rgb(236, 132, 68); }

.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.section-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;   /* center alignment */
  align-items: center;
  gap: 10px;                /* equal spacing */
  padding: 15px;
  text-align: center;
  
}

.section-btn {
  margin-top: 15px;
  margin-left: 10px;
  background: #f97316;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  
  transition: 0.3s;
  text-align: center;
  box-shadow: 0 3px 8px egba(0,0,0,0.2);
  transition: all 0.3s ease;
 
}

.section-btn:hover {
  background: #e65c00;
  transform: translatey(-2px);
}
/* FAQ */
.question {
  margin-top: 10px;
  background:#ddd;
  margin-:5px;
  padding:6px;
  border-radius:10px;
  cursor:pointer;
  font-size: 13px;
  margin-left: 3px;
  margin-right: 3px;

}
.question:hover {
  background: #ccc;
}

.answer {
  display:none;
  background:#313030;
  color:white;
  margin:5px;
  padding:8px;
  border-radius:10px;
  font-size: 15px;
  transition: all 0.3s ease;;
}

/* MENU */
.menu-panel {
  position:absolute;
  top:45px;
  right:10px;
  width:230px;
  background:white;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  display:none;
  padding:10px;
  font-size: 14px;
  margin:3px;
  z-index:100;
}

.menu-title {
  font-weight:bold;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
  padding: 5px 0;
}
.menu-content {
  font-size:13px;
  margin:5px 0;
  transition: all 0.3s ease;
}
.menu-item {
  padding: 10px 0;
  border-bottom: 3px solid #f0f0f0;
}
</style>
</head>

<body>

<div class="chatbot-logo" id="chatIcon">
  <img src="assets/icon.png" alt="chatbot">
</div>

<div id="chatBox" class="chatbot-container">

  <div class="header">
    <span onclick="goBack()">←</span>
    <span>TrackIn-Take Bot</span>
    <span onclick="toggleMenu()">☰</span>
  </div>

  <div id="menuPanel" class="menu-panel"></div>
  <div id="content"></div>

</div>

<script>

let historyStack = [];
let activeData = null;

/* 🔥 CLICK EVENT FIX */
document.addEventListener("DOMContentLoaded", function(){

  const icon = document.getElementById("chatIcon");
  const chatBox = document.getElementById("chatBox");

  icon.addEventListener("click", function(){

    if(chatBox.style.display === "flex"){
      chatBox.style.display = "none";
    } else {
      chatBox.style.display = "flex";
      showHome();
    }

  });

});

/* FETCH MENU FROM BACKEND */
async function loadMenu(){
  let res = await fetch("https://chatbot-3-3cn3.onrender.com/api/menu/");
  return await res.json();
}

/* FETCH FAQ FROM BACKEND */
async function loadFAQs(role){
  let res = await fetch(`https://chatbot-3-3cn3.onrender.com/api/chat/?role=${role}`);
  return await res.json();
}

/* HOME */
function showHome(){
 document.getElementById("content").innerHTML=`
 <div style="text-align:center;padding:20px;">
   <h3>Welcome 👋</h3>
   <button onclick="openSection('user')">User</button>
   <button onclick="openSection('nutritionist')">Nutritionist</button>
 </div>`;
}

/* OPEN SECTION */
async function openSection(role){

 historyStack.push(document.getElementById("content").innerHTML);

 activeData = await loadFAQs(role);

 let html="";
 for(let cat in activeData){
   html+=`<button onclick="showQ('${cat}')">${cat}</button>`;
 }

 document.getElementById("content").innerHTML = html;
}

/* QUESTIONS */
function showQ(cat){

 historyStack.push(document.getElementById("content").innerHTML);

 let faqs = activeData[cat];
 let html="";

 faqs.forEach((item,i)=>{
   html+=`
   <div onclick="toggleAns(${i})">${item.q}</div>
   <div id="ans${i}" style="display:none;">${item.a}</div>
   `;
 });

 document.getElementById("content").innerHTML=html;
}

/* TOGGLE */
function toggleAns(i){
 let el = document.getElementById("ans"+i);
 el.style.display = el.style.display === "block" ? "none" : "block";
}

</script>
</body>
</html>
